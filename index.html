<meta charset="utf-8">
<title>Orbs — 记忆球</title>

<style>
  /* A skin is just a set of tokens on .stage[data-theme]. Everything below
     draws from these, so a new theme is a colour recipe, not new markup.
     Defaults here = Marshmallow, the theme when no data-theme is set. */
  :root {
    --gold-on: #FFFFFF;
    --display: ui-rounded, "SF Pro Rounded", "Avenir Next", "Hiragino Maru Gothic ProN", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    --body: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
  }

  /* ---- Marshmallow (default) ---- */
  .stage, .stage[data-theme="marshmallow"] {
    --stage-bg:
      radial-gradient(ellipse 60% 40% at 12% 8%,  rgba(255,183,214,.75), transparent 62%),
      radial-gradient(ellipse 55% 40% at 88% 18%, rgba(186,205,255,.70), transparent 62%),
      radial-gradient(ellipse 70% 45% at 78% 82%, rgba(255,214,178,.70), transparent 62%),
      radial-gradient(ellipse 60% 45% at 18% 92%, rgba(190,240,220,.65), transparent 62%),
      linear-gradient(170deg, #FFE7F3 0%, #EDE4FF 45%, #DCF1FF 100%);
    --app-bg:
      radial-gradient(ellipse 70% 34% at 16% 6%,   rgba(255,170,214,.80), transparent 62%),
      radial-gradient(ellipse 66% 30% at 96% 22%,  rgba(168,190,255,.78), transparent 62%),
      radial-gradient(ellipse 60% 26% at 6% 46%,   rgba(178,232,255,.70), transparent 62%),
      radial-gradient(ellipse 70% 30% at 92% 66%,  rgba(255,206,168,.75), transparent 62%),
      radial-gradient(ellipse 86% 34% at 46% 102%, rgba(170,238,206,.80), transparent 66%),
      linear-gradient(172deg, #FFE9F6 0%, #EFE6FF 40%, #E2F1FF 72%, #EAFBF2 100%);
    --cloud: rgba(255,255,255,.92);
    --cast: rgba(112,74,150,.45);
    --shelf: #FFF7FC;
    --glass: rgba(255,255,255,.5);
    --glass2: rgba(255,255,255,.6);
    --sel: #fff;
    --card:  rgba(255,255,255,.62);
    --card-2:rgba(255,255,255,.86);
    --line:  rgba(122,86,160,.18);
    --ink:   #4A3363;
    --muted: #7D6B99;
    --dim:   #9C8DB8;
    --gold:  #C06A12;
    --candy: #FF8FBF;
  }

  /* ---- Sunset: warm coral, peach, gold ---- */
  .stage[data-theme="sunset"] {
    --stage-bg:
      radial-gradient(ellipse 60% 40% at 14% 8%,  rgba(255,176,120,.80), transparent 62%),
      radial-gradient(ellipse 60% 42% at 86% 20%, rgba(255,150,170,.72), transparent 62%),
      radial-gradient(ellipse 70% 45% at 80% 88%, rgba(255,200,110,.70), transparent 62%),
      linear-gradient(165deg, #FFE3CE 0%, #FFD3D0 48%, #FBE0B8 100%);
    --app-bg:
      radial-gradient(ellipse 72% 34% at 16% 4%,  rgba(255,150,110,.82), transparent 62%),
      radial-gradient(ellipse 66% 30% at 98% 26%, rgba(255,120,150,.78), transparent 62%),
      radial-gradient(ellipse 70% 30% at 88% 70%, rgba(255,196,96,.80), transparent 62%),
      radial-gradient(ellipse 86% 34% at 40% 104%, rgba(255,168,120,.82), transparent 66%),
      linear-gradient(170deg, #FFEAD8 0%, #FFDCCF 42%, #FFE7C4 100%);
    --cloud: rgba(255,250,240,.92);
    --cast: rgba(180,90,70,.45);
    --shelf: #FFF6EE;
    --glass: rgba(255,252,246,.52);
    --glass2: rgba(255,252,246,.62);
    --sel: #fff;
    --card:  rgba(255,250,244,.62);
    --card-2:rgba(255,250,244,.88);
    --line:  rgba(170,90,60,.18);
    --ink:   #5A2E28;
    --muted: #93655A;
    --dim:   #B58C7E;
    --gold:  #B85B0E;
    --candy: #FF7A6B;
  }

  /* ---- Meadow: mint, sage, sky ---- */
  .stage[data-theme="meadow"] {
    --stage-bg:
      radial-gradient(ellipse 60% 40% at 12% 8%,  rgba(150,225,190,.78), transparent 62%),
      radial-gradient(ellipse 58% 42% at 88% 18%, rgba(168,214,255,.70), transparent 62%),
      radial-gradient(ellipse 70% 45% at 80% 88%, rgba(224,240,150,.66), transparent 62%),
      linear-gradient(165deg, #DEF6E6 0%, #DCF0F6 50%, #EAF6D8 100%);
    --app-bg:
      radial-gradient(ellipse 72% 34% at 16% 4%,  rgba(120,214,168,.80), transparent 62%),
      radial-gradient(ellipse 66% 30% at 98% 26%, rgba(140,200,255,.74), transparent 62%),
      radial-gradient(ellipse 70% 30% at 88% 70%, rgba(210,232,120,.72), transparent 62%),
      radial-gradient(ellipse 86% 34% at 40% 104%, rgba(150,224,182,.82), transparent 66%),
      linear-gradient(172deg, #E4F7EC 0%, #E2F2F6 44%, #EFF7DE 100%);
    --cloud: rgba(252,255,250,.92);
    --cast: rgba(60,140,110,.42);
    --shelf: #F2FBF4;
    --glass: rgba(250,255,251,.5);
    --glass2: rgba(250,255,251,.6);
    --sel: #fff;
    --card:  rgba(248,255,250,.62);
    --card-2:rgba(248,255,250,.88);
    --line:  rgba(50,130,95,.18);
    --ink:   #234A38;
    --muted: #4E7A64;
    --dim:   #7EA791;
    --gold:  #2E7D46;
    --candy: #37B98A;
  }

  /* ---- Midnight: deep indigo with an aurora ---- */
  .stage[data-theme="midnight"] {
    --stage-bg:
      radial-gradient(ellipse 60% 44% at 16% 6%,  rgba(90,120,255,.30), transparent 62%),
      radial-gradient(ellipse 60% 44% at 84% 90%, rgba(120,90,200,.30), transparent 62%),
      linear-gradient(170deg, #0B0A1E 0%, #131033 50%, #0C1226 100%);
    --app-bg:
      radial-gradient(ellipse 74% 34% at 18% 2%,  rgba(80,200,190,.34), transparent 60%),
      radial-gradient(ellipse 70% 32% at 98% 22%, rgba(120,110,255,.36), transparent 60%),
      radial-gradient(ellipse 70% 30% at 8% 60%,  rgba(210,110,220,.26), transparent 60%),
      radial-gradient(ellipse 86% 36% at 50% 104%, rgba(90,150,255,.30), transparent 64%),
      linear-gradient(175deg, #14122E 0%, #1A1740 46%, #101028 100%);
    --cloud: rgba(150,180,255,.22);
    --cast: rgba(0,0,0,.6);
    --shelf: #191636;
    --glass: rgba(28,24,58,.55);
    --glass2: rgba(28,24,58,.62);
    --sel: rgba(255,255,255,.16);
    --card:  rgba(255,255,255,.07);
    --card-2:rgba(255,255,255,.13);
    --line:  rgba(255,255,255,.14);
    --ink:   #ECEEFF;
    --muted: #A6ADD8;
    --dim:   #7C82AE;
    --gold:  #FFD45E;
    --candy: #FF8FC0;
  }

  * { box-sizing: border-box; }

  .stage {
    background: var(--stage-bg);
    color: var(--ink);
    transition: background .5s ease, color .5s ease;
    font-family: var(--body);
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px 16px 40px;
  }

  .app {
    width: 100%;
    max-width: 400px;
    background: var(--app-bg);
    border: 1px solid rgba(255,255,255,.28);
    border-radius: 32px;
    box-shadow: 0 40px 90px -34px var(--cast), 0 0 0 1px rgba(255,255,255,.28) inset;
    transition: background .5s ease;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 720px;
    position: relative;
  }

  /* marshmallow clouds: pure decoration, drifting behind everything */
  .app::before, .app::after {
    content: ""; position: absolute; z-index: 0; pointer-events: none;
    border-radius: 50%; filter: blur(26px);
  }
  .app::before {
    width: 260px; height: 130px; left: -70px; top: 190px;
    background: radial-gradient(ellipse, var(--cloud), transparent 70%);
    animation: drift 26s ease-in-out infinite;
  }
  .app::after {
    width: 300px; height: 150px; right: -110px; bottom: 130px;
    background: radial-gradient(ellipse, var(--cloud), transparent 70%);
    animation: drift 34s ease-in-out infinite reverse;
  }
  @keyframes drift {
    0%, 100% { transform: translate(0, 0); }
    50%      { transform: translate(26px, -18px); }
  }
  .topbar, .view, .nav { position: relative; z-index: 1; }

  /* ---------- chrome ---------- */
  .topbar {
    display: flex; align-items: center; gap: 8px;
    padding: 15px 16px; min-height: 58px;
    border-bottom: 1px solid var(--line);
    background: var(--glass);
    backdrop-filter: blur(10px);
  }
  .topbar h1 {
    margin: 0; flex: 1;
    font-family: var(--display); font-size: 17px; font-weight: 600;
    letter-spacing: -.01em; text-wrap: balance;
  }
  .lang {
    background: transparent; border: 1px solid var(--line); color: var(--muted);
    border-radius: 999px; padding: 5px 11px; font-size: 11.5px; font-weight: 600;
    letter-spacing: .04em; cursor: pointer;
  }
  .lang:hover { color: var(--ink); border-color: var(--dim); }

  .view { flex: 1; padding: 20px 18px 24px; display: flex; flex-direction: column; gap: 20px; overflow: hidden; }

  .nav {
    display: flex; border-top: 1px solid var(--line);
    background: var(--glass2);
    backdrop-filter: blur(10px);
  }
  .nav button {
    flex: 1; background: none; border: none; color: var(--dim);
    padding: 12px 6px 14px; font-size: 11.5px; font-weight: 600;
    font-family: var(--display); letter-spacing: .02em; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
  }
  .nav button .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: .35; }
  .nav button[aria-current="page"] { color: var(--gold); }
  .nav button[aria-current="page"] .dot { opacity: 1; box-shadow: 0 0 8px var(--gold); }

  /* ---------- orbs ----------
     They hang in the air rather than sitting in a grid: staggered columns,
     each orb bobbing on its own clock so the wall never pulses in unison. */
  .orbwall {
    display: flex; flex-wrap: wrap;
    justify-content: center; align-items: flex-start;
    gap: 4px 2px; padding: 26px 0 34px;
  }
  .orb-cell {
    background: none; border: none; padding: 0; cursor: pointer;
    width: 48%; display: flex; justify-content: center;
  }
  /* every other orb rides lower, so the two columns interlock */
  .orb-cell:nth-child(even) { margin-top: 34px; }
  .orb-cell:nth-child(4n+3) { margin-top: -10px; }

  .orb-wrap { animation: float var(--dur, 7s) ease-in-out infinite; will-change: transform; }
  .orb-cell:hover .orb { transform: scale(1.05); }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33%      { transform: translate(4px, -11px) rotate(.8deg); }
    66%      { transform: translate(-4px, -5px) rotate(-.8deg); }
  }

  .orb {
    position: relative; display: grid; place-items: center; border-radius: 50%;
    background-size: cover; background-position: center;
    transition: transform .3s cubic-bezier(.2,.9,.3,1.2);
    isolation: isolate; text-align: center;
  }
  /* photo sits under a soft scrim so white type always survives it */
  .orb .wash {
    position: absolute; inset: 0; border-radius: 50%; z-index: 1;
    background:
      radial-gradient(circle at 50% 28%, transparent 0%, rgba(38,10,58,.30) 74%, rgba(38,10,58,.48) 100%),
      linear-gradient(180deg, transparent 22%, rgba(28,8,44,.40) 100%);
    opacity: .88;
  }
  /* glass: rim light, inner shading, specular hotspot */
  .orb .glass {
    position: absolute; inset: 0; border-radius: 50%; z-index: 3; pointer-events: none;
    background:
      radial-gradient(circle at 32% 24%, rgba(255,255,255,.62) 0%, rgba(255,255,255,.14) 20%, transparent 44%),
      radial-gradient(circle at 70% 80%, rgba(255,255,255,.30) 0%, transparent 34%);
    box-shadow:
      inset 0 0 0 1.5px rgba(255,255,255,.55),
      inset -9px -13px 30px rgba(70,30,90,.35),
      inset 8px 9px 24px rgba(255,255,255,.30);
  }
  .orb .spark {
    position: absolute; top: 14%; left: 21%; width: 20%; height: 13%;
    border-radius: 50%; z-index: 4; pointer-events: none;
    background: rgba(255,255,255,.92); filter: blur(1.6px);
  }

  /* the caption lives INSIDE the sphere */
  .orb .orb-label {
    position: relative; z-index: 5; padding: 0 16%;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    color: #fff; text-shadow: 0 1px 6px rgba(60,20,80,.55), 0 0 22px rgba(60,20,80,.35);
  }
  .orb .orb-label .nm {
    font-family: var(--display); font-weight: 700; letter-spacing: -.01em;
    line-height: 1.15; text-wrap: balance;
  }
  .orb .orb-label .hrs {
    font-family: var(--mono); font-variant-numeric: tabular-nums;
    font-weight: 600; opacity: .95;
  }
  .orb .orb-label .flame { font-size: .78em; opacity: .95; }

  .orb-glow { position: relative; display: inline-block; }
  .orb-glow::before {
    content: ""; position: absolute; inset: -20%; border-radius: 50%;
    filter: blur(20px); opacity: .6; z-index: 0;
    background: radial-gradient(circle, var(--c) 0%, transparent 66%);
  }
  /* the shadow it casts on the cloud floor, sold separately */
  .orb-glow::after {
    content: ""; position: absolute; left: 12%; right: 12%; bottom: -14%;
    height: 12%; border-radius: 50%; z-index: -1;
    background: radial-gradient(ellipse, rgba(122,86,160,.30), transparent 70%);
    filter: blur(6px);
  }

  .orb-name {
    font-family: var(--display); font-size: 13.5px; font-weight: 600;
    text-align: center; line-height: 1.3; color: var(--ink);
  }
  .orb-meta { font-family: var(--mono); font-size: 11px; color: var(--dim); font-variant-numeric: tabular-nums; }
  .orb-meta .hot { color: var(--gold); }

  .add-orb .orb-wrap { display: flex; flex-direction: column; align-items: center; gap: 9px; }
  .add-orb .plus {
    width: 86px; height: 86px; border-radius: 50%;
    border: 2px dashed rgba(122,86,160,.35); color: var(--muted);
    background: rgba(255,255,255,.42);
    display: grid; place-items: center; font-size: 30px; font-family: var(--display);
  }
  .add-orb:hover .plus { border-color: var(--candy); color: var(--candy); background: rgba(255,255,255,.7); }

  /* ---------- interest cover ---------- */
  .cover {
    position: relative; width: 100%; aspect-ratio: 16 / 9;
    border-radius: 20px; overflow: hidden; flex: none;
    box-shadow: 0 14px 34px -16px rgba(122,86,160,.65);
  }
  .cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cover.blank {
    background: radial-gradient(circle at 28% 22%, rgba(255,255,255,.5) 0%, transparent 42%), var(--c);
    display: grid; place-items: center;
  }
  .cover.blank .mono {
    font-family: var(--display); font-size: 84px; font-weight: 700;
    color: rgba(255,255,255,.5); line-height: 1;
    text-shadow: 0 3px 14px rgba(50,15,70,.3);
  }
  .cover .veil {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 38%, rgba(34,12,52,.62) 100%);
  }
  .cover .cap { position: absolute; left: 14px; right: 14px; bottom: 11px; color: #fff; }
  .cover .cap .t {
    font-family: var(--display); font-size: 20px; font-weight: 700;
    letter-spacing: -.015em; text-shadow: 0 1px 8px rgba(34,12,52,.7);
  }
  .cover .cap .s {
    font-size: 12px; opacity: .9; margin-top: 1px;
    text-shadow: 0 1px 6px rgba(34,12,52,.7);
  }

  /* ---------- explore ---------- */
  .safe-note {
    display: flex; gap: 9px; align-items: flex-start;
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 10px 12px; font-size: 12px; color: var(--muted); line-height: 1.5;
  }
  .safe-note span:first-child { flex: none; }
  .ideas { display: flex; flex-direction: column; gap: 9px; }
  .idea {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 16px; padding: 10px 12px 10px 10px;
  }
  .idea .orb-wrap { animation: none; }
  .idea-nm { font-family: var(--display); font-weight: 600; font-size: 15px; color: var(--ink); }
  .idea-cat { font-size: 11.5px; color: var(--dim); letter-spacing: .03em; }
  .idea-add {
    flex: none; background: var(--sel); border: 1px solid var(--line); color: var(--ink);
    border-radius: 999px; padding: 8px 13px; font-size: 12.5px; font-weight: 600;
    font-family: var(--display); white-space: nowrap;
  }
  .idea-add:hover { border-color: var(--candy); color: var(--candy); }
  .recs-because { padding: 2px 2px 4px; }

  /* private / public segmented control */
  .seg { display: flex; gap: 6px; background: var(--glass); padding: 4px; border-radius: 12px; }
  .seg button {
    flex: 1; background: none; border: none; padding: 9px; border-radius: 9px;
    font-size: 13.5px; font-weight: 600; font-family: var(--display); color: var(--muted);
  }
  .seg button[aria-pressed="true"] { background: var(--sel); color: var(--ink); box-shadow: 0 2px 8px -3px rgba(0,0,0,.25); }

  /* community post cards (fake, illustrated) */
  .avatar {
    border-radius: 50%; flex: none; display: grid; place-items: center;
    color: #fff; font-family: var(--display); font-weight: 700;
    box-shadow: inset -2px -3px 6px rgba(0,0,0,.28), inset 2px 2px 5px rgba(255,255,255,.35);
  }
  .avatar.anon { width: 30px; height: 30px; background: var(--card-2); font-size: 16px; box-shadow: none; }
  .post {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 18px; overflow: hidden;
  }
  .post-pic { width: 100%; aspect-ratio: 16 / 7; overflow: hidden; }
  .post-pic svg { width: 100%; height: 100%; display: block; }
  .post-body { padding: 11px 13px 12px; display: flex; flex-direction: column; gap: 9px; }
  .post-who { display: flex; align-items: center; gap: 9px; }
  .post-nm { font-family: var(--display); font-weight: 600; font-size: 13.5px; color: var(--ink); }
  .post-sub { font-size: 11px; color: var(--dim); }
  .post-cap { font-size: 14px; color: var(--ink); line-height: 1.5; overflow-wrap: anywhere; }
  .post-foot { display: flex; align-items: center; gap: 10px; }
  .post-min { flex: 1; font-family: var(--mono); font-size: 11.5px; color: var(--muted); }

  /* the school web */
  .web {
    position: relative; width: 100%; aspect-ratio: 1; max-width: 320px;
    margin: 4px auto 0;
  }
  .web-lines { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
  .web-link { stroke: var(--candy); stroke-width: .7; stroke-opacity: .5; stroke-dasharray: 2 2; }
  .web-node {
    position: absolute; transform: translate(-50%, -50%);
    background: none; border: none; padding: 0; cursor: pointer;
    filter: drop-shadow(0 4px 10px var(--cast));
  }
  .web-node.me { pointer-events: none; }
  .web-node.linked .avatar { box-shadow: 0 0 0 3px color-mix(in srgb, var(--candy) 55%, transparent), inset -2px -3px 6px rgba(0,0,0,.28); }
  .web-node:hover { transform: translate(-50%, -50%) scale(1.08); }

  /* ---------- theme picker ---------- */
  .themes { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .theme-btn {
    position: relative; border: 1.5px solid var(--line); border-radius: 16px;
    padding: 0; overflow: hidden; cursor: pointer; background: none;
    display: flex; flex-direction: column; gap: 0; text-align: left;
  }
  .theme-btn .band { height: 46px; display: flex; }
  .theme-btn .band span { flex: 1; }
  .theme-btn .nm {
    padding: 8px 12px; font-family: var(--display); font-weight: 600; font-size: 13.5px;
    color: var(--ink); background: var(--card-2); backdrop-filter: blur(6px);
  }
  .theme-btn[aria-pressed="true"] { border-color: var(--candy); box-shadow: 0 0 0 3px color-mix(in srgb, var(--candy) 30%, transparent); }
  .theme-btn[aria-pressed="true"] .nm::after { content: " ✓"; color: var(--candy); }

  /* ---------- blocks ---------- */
  .memory {
    border: 1px solid var(--line); border-radius: 18px; padding: 14px;
    background: linear-gradient(150deg, rgba(255,255,255,.85), rgba(255,225,240,.6));
    display: flex; gap: 13px; align-items: center; cursor: pointer; width: 100%;
    text-align: left; color: inherit;
  }
  .memory:hover { border-color: var(--dim); }
  .memory .body { flex: 1; min-width: 0; }
  .memory .kicker { font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--gold); font-weight: 700; }
  .memory .text { font-size: 13.5px; color: var(--ink); margin-top: 3px; overflow-wrap: anywhere;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .memory .when { font-family: var(--mono); font-size: 11px; color: var(--dim); margin-top: 4px; }
  .memory img { width: 54px; height: 54px; border-radius: 12px; object-fit: cover; flex: none; }

  .nudge {
    border: 1px solid rgba(255,168,120,.45); border-radius: 16px;
    background: linear-gradient(140deg, rgba(255,236,205,.95), rgba(255,214,232,.8)); padding: 13px 14px;
    display: flex; gap: 12px; align-items: center;
  }
  .nudge .body { flex: 1; }
  .nudge .head { font-family: var(--display); font-size: 14.5px; font-weight: 600; }
  .nudge .sub { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  .nudge .bell { font-size: 18px; }

  .label { font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--dim); font-weight: 700; }
  .empty { color: var(--muted); font-size: 14px; text-align: center; padding: 26px 14px; line-height: 1.7; }

  .scroll { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 16px; margin: 0 -18px; padding: 0 18px; }
  .scroll::-webkit-scrollbar { width: 0; }

  /* ---------- controls ---------- */
  button { font: inherit; color: var(--ink); cursor: pointer; border-radius: 12px; border: 1px solid transparent; }

    return (n === 1 && SINGULARS[key]) ? t(SINGULARS[key]) : t(key);
  }

  function nameOf(it) { return LANG === "en" ? it.name : (it.nameZh || it.name); }

  function fmtDate(iso) {
    var d = new Date(iso + "T00:00:00");
    var now = new Date(); now.setHours(0, 0, 0, 0);
    var diff = Math.round((now - d) / 86400000);
    if (diff === 0) return LANG === "en" ? "Today" : "今天";
    if (diff === 1) return LANG === "en" ? "Yesterday" : "昨天";
    if (LANG === "zh") return (d.getMonth() + 1) + "月" + d.getDate() + "日";
    return d.toLocaleDateString("en-GB", { day: "numeric", month: "short" });
  }

  /* ================= dom ================= */
  function el(tag, attrs, kids) {
    var n = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(function (k) {
      var v = attrs[k];
      if (v === null || v === undefined) return;
      if (k === "class") n.className = v;
      else if (k === "text") n.textContent = v;
      else if (k.slice(0, 2) === "on") n.addEventListener(k.slice(2), v);
      else n.setAttribute(k, v);
    });
    (kids || []).forEach(function (c) { if (c) n.appendChild(c); });
    return n;
  }

  // label: when true the orb carries its own name + hours + streak inside the glass
  function orbEl(it, size, faceBlob, label) {
    var wrap = el("span", { class: "orb-glow" });
    wrap.style.setProperty("--c", it.color);
    var o = el("span", { class: "orb" });
    o.style.width = size + "px";
    o.style.height = size + "px";

    if (faceBlob) {
      o.style.backgroundImage = "url(" + objURL(faceBlob) + ")";
      o.appendChild(el("span", { class: "wash" }));
    } else {
      o.style.background = "radial-gradient(circle at 34% 30%, " + shade(it.color, 45) + " 0%, " + it.color + " 46%, " + shade(it.color, -60) + " 100%)";
    }

    if (label) {
      var st = interestStreak(it.id);
      var lab = el("span", { class: "orb-label" }, [
        el("span", { class: "nm", text: nameOf(it), style: "font-size:" + Math.round(size * 0.125) + "px" }),
        el("span", { class: "hrs", text: fmtHours(minutesOf(it.id)), style: "font-size:" + Math.round(size * 0.115) + "px" })
      ]);
      if (st > 0) lab.appendChild(el("span", { class: "flame", text: "🔥 " + st,
        style: "font-size:" + Math.round(size * 0.10) + "px" }));
      o.appendChild(lab);
    }

    o.appendChild(el("span", { class: "glass" }));
    o.appendChild(el("span", { class: "spark" }));
    wrap.appendChild(o);
    return wrap;
  }
  function shade(hex, amt) {
    var n = parseInt(hex.slice(1), 16);
    var r = Math.max(0, Math.min(255, (n >> 16) + amt));
    var g = Math.max(0, Math.min(255, ((n >> 8) & 255) + amt));
    var b = Math.max(0, Math.min(255, (n & 255) + amt));
    return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
  }

  /* ================= reminders ================= */
  var timers = [];
  function clearTimers() { timers.forEach(clearTimeout); timers = []; }

  function minutesNow() { var d = new Date(); return d.getHours() * 60 + d.getMinutes(); }
  function parseTime(hhmm) { var p = (hhmm || "").split(":"); return p.length === 2 ? (+p[0]) * 60 + (+p[1]) : null; }

  function nudgeHead(it) {
    return LANG === "en" ? nameOf(it) + " at " + it.time : it.time + " " + nameOf(it);
  }
  function nudgeSub(it) {
    var friends = (it.friends || []).filter(Boolean);
    if (!friends.length) return t("nudgeSolo");
    return t("askCome") + friends[0] + t("askCome2");
  }
  function nudgeText(it) { return nudgeHead(it) + " — " + nudgeSub(it); }

  // A nudge is due in the 90 minutes before the chosen time, if nothing was
  // logged for that orb today and the user hasn't waved it off.
  function dueNudges() {
    var now = minutesNow();
    return S.interests.filter(function (it) {
      if (!it.time || view.dismissed[it.id] === today()) return false;
      var mins = parseTime(it.time);
      if (mins === null) return false;
      var lead = mins - now;
      if (lead < 0 || lead > 90) return false;
      return !entriesOf(it.id).some(function (e) { return e.date === today(); });
    });
  }

  function scheduleTimers() {
    clearTimers();
    var now = minutesNow();
    S.interests.forEach(function (it) {
      var mins = parseTime(it.time);
      if (mins === null) return;
      var fireAt = mins - 15;              // 15 minutes before
      var delay = (fireAt - now) * 60000;
      if (delay <= 0 || delay > 12 * 3600000) return;
      timers.push(setTimeout(function () {
        if (window.Notification && Notification.permission === "granted") {
          try { new Notification(t("appName"), { body: nudgeText(it) }); } catch (e) {}
        }
        render();
      }, delay));
    });
  }

  /* ================= render ================= */
  function go(screen, opts) { Object.assign(view, { screen: screen, sheet: null, viewer: null }, opts || {}); render(); }
  function closeSheet() { view.sheet = null; view.viewer = null; render(); }

  function render() {
    revokeAll();
    var top = document.getElementById("topbar");
    var v = document.getElementById("view");
    var nav = document.getElementById("nav");
    top.innerHTML = ""; v.innerHTML = ""; nav.innerHTML = "";

    var old = document.querySelector(".sheet-bg, .viewer");
    if (old) old.remove();

    if (!S.profile) { renderOnboarding(top, v); return; }

    ({ home: renderHome, interest: renderInterest, explore: renderExplore, profile: renderProfile, saved: renderSaved })[view.screen](top, v);

    if (view.screen !== "saved") renderNav(nav);
    if (view.sheet) renderSheet();
    if (view.viewer) renderViewer();
  }

        LANG = LANG === "en" ? "zh" : "en";

      nav.appendChild(el("button", {
        "aria-current": (view.screen === p[0] || (p[0] === "home" && view.screen === "interest")) ? "page" : null,
        onclick: function () { go(p[0], p[0] === "explore" ? { etab: view.etab || "explore" } : null); }
      }, [el("span", { class: "dot" }), el("span", { text: p[1] })]));

            onclick: function () { onb.drafts.splice(i, 1); render(); } }, [

      box.appendChild(el("div", { class: "grow" }));
      box.appendChild(el("button", { class: "btn", text: t("next"), disabled: onb.drafts.length ? null : "",
        onclick: function () { if (onb.drafts.length) { onb.step = 3; render(); } } }));
      setTimeout(function () { input2.focus(); }, 30);

    // step 3 — time + friends per orb
    box.appendChild(el("h2", { text: t("setupTitle") }));

    var list = el("div", { class: "scroll" });
    onb.drafts.forEach(function (d) {
      var timeIn = el("input", { type: "time", value: d.time });

      var friendIn = el("input", { type: "text", placeholder: t("friendsPh"), maxlength: "60" });

      });
      list.appendChild(el("div", { class: "setup-row" }, [
        el("div", { class: "who" }, [orbEl(d, 30), el("span", { class: "n", text: d.name })]),
        el("div", { class: "field" }, [el("span", { class: "label", text: t("timeLabel") }), timeIn]),
        el("div", { class: "field" }, [el("span", { class: "label", text: t("friendsLabel") }), friendIn])
      ]));
    });
    box.appendChild(list);

    box.appendChild(el("button", { class: "btn", text: t("enter"), onclick: function () {
      S.profile = { key: "profile", name: onb.name.trim(), lang: LANG, color: PALETTE[0], theme: DEFAULT_THEME, createdAt: Date.now() };
      putAll("meta", S.profile);
      onb.drafts.forEach(function (d) {
        var rec = { id: d.id, name: d.name, color: d.color, why: "", time: d.time, friends: d.friends,
                    createdAt: Date.now(), updatedAt: Date.now() };
        S.interests.push(rec);
        putAll("interests", rec);
      });
      askNotifications();
      scheduleTimers();
      go("home");
    }}));
  }

  function resurfaced() {
    var pool = [];
    S.photos.forEach(function (p) {
      var it = byId(p.interestId); if (!it) return;
      pool.push({ interest: it, blob: p.blob, text: p.caption, date: dateKey(new Date(p.createdAt)), pin: p.isPinned, at: p.createdAt });
    });
    S.entries.forEach(function (e) {
      var it = byId(e.interestId); if (!it) return;
      pool.push({ interest: it, blob: null, text: e.text, date: e.date, pin: e.isPinned, at: e.createdAt });
    });
    if (!pool.length) return null;

    // The useful case first: an orb you've stopped touching. Surface its best
    // moment alongside how long it's been, so the reminder has a reason.
    var quietest = null, quietDays = 0;
    S.interests.forEach(function (it) {
      var en = entriesOf(it.id);
      if (!en.length) return;                       // never started — not "neglected"
      var last = keyDays(en[0].date);
      var gap = Math.floor((keyDays(today()) - last));
      if (gap >= 4 && gap > quietDays) { quietDays = gap; quietest = it; }
    });
    if (quietest) {
      var mine = pool.filter(function (x) { return x.interest.id === quietest.id; });
      var best = mine.filter(function (x) { return x.pin; })[0] || mine[0];
      if (best) { best.quietDays = quietDays; return best; }
    }

    // Otherwise: a good memory, worth reopening.
    var pinned = pool.filter(function (x) { return x.pin; });
    var from = pinned.length ? pinned : pool;
    var old = from.filter(function (x) { return Date.now() - x.at > 3 * 86400000; });
    var pick = (old.length ? old : from);
    return pick[Math.floor(Date.now() / 86400000) % pick.length];
  }

  function keyDays(k) { return Math.round(keyToDate(k).getTime() / 86400000); }
  function keyToDate(k) { var p = k.split("-"); return new Date(+p[0], +p[1] - 1, +p[2]); }

  function byId(id) { return S.interests.filter(function (x) { return x.id === id; })[0]; }

    if (line.children.length) bits.push(line);

    var tabs = el("div", { class: "tabs" });
    [["album", t("album")], ["journal", t("journal")]].forEach(function (p) {
      tabs.appendChild(el("button", { text: p[1], "aria-selected": view.tab === p[0] ? "true" : "false",
        onclick: function () { view.tab = p[0]; render(); } }));
    });
    v.appendChild(tabs);

    if (view.tab === "album") {
      if (!ph.length) scroll.appendChild(el("div", { class: "empty", text: t("noPhotos") }));
      else {
        var grid = el("div", { class: "photogrid" });
        ph.forEach(function (p) {
          grid.appendChild(el("button", { "aria-label": p.caption || t("photos"),
            onclick: function () { view.viewer = p.id; render(); } },
            [el("img", { src: objURL(p.blob), alt: p.caption || "" })]));

      else en.forEach(function (e) {
        scroll.appendChild(el("div", { class: "entry" }, [
          el("div", {}, [
            el("div", { class: "d", text: fmtDate(e.date) + (e.isPinned ? "  ★" : "") +
              (e.visibility === "public" ? "  🌐" : "") }),
            el("div", { class: "t", text: e.text })
          ]),
          el("button", { class: "icon", text: "×", "aria-label": t("del"),
            onclick: function () {
              S.entries = S.entries.filter(function (x) { return x.id !== e.id; });

      onclick: function () { view.sheet = { type: view.tab === "album" ? "photo" : "entry", id: it.id }; render(); } }));
  }

  /* ---------- explore ---------- */
  // A deterministic shuffle keyed by a seed, so "Shuffle" changes the order
  // but a given seed is stable across a re-render.
  function shuffled(arr, seed) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      seed = (seed * 9301 + 49297) % 233280;
      var j = Math.floor((seed / 233280) * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function recommendations() {
    // Score every idea by how close it sits to what the user already loves.
    var cats = {};

    st.orbs.forEach(function (o) {
      var isShared = shared.indexOf(o) !== -1;
      var fake = { color: PALETTE[st.color], name: o[LANG === "en" ? 0 : 1] };
      wrap.appendChild(el("div", { class: "idea" }, [
        el("div", { class: "orb-wrap", style: "flex:none" }, [orbEl(fake, 46)]),
        el("div", { class: "grow" }, [
          el("div", { class: "idea-nm", text: o[LANG === "en" ? 0 : 1] }),
          el("div", { class: "idea-cat", text: fmtHours(o[3]) + (isShared ? "  ·  ✨" : "") })
        ]),
        haveHobby(o) ? null : el("button", { class: "idea-add", text: t("startThis"),
          onclick: function () {
            view.sheet = { type: "orb", preset: { name: o[0], nameZh: o[1], color: PALETTE[ideaColor(o[0])] } };
            render();
          } })
      ]));
    });
    body.appendChild(wrap);
    body.appendChild(el("button", { class: "btn2", text: t("close"), onclick: closeSheet }));
  }

  function pinRow(state, onToggle) {
    var b = el("button", { class: "chip", "aria-pressed": state ? "true" : "false",
      text: (state ? "★ " : "☆ ") + t("pin") });
    b.addEventListener("click", function () {
      state = !state; onToggle(state);
      b.textContent = (state ? "★ " : "☆ ") + t("pin");
      b.setAttribute("aria-pressed", state ? "true" : "false");
    });
    return el("div", { class: "chips" }, [b]);
  }

  // Private / Public choice. Honest by construction: it only stores a flag —
  // there is no server, no other user, and nothing is ever transmitted.
  function visRow(state, onToggle) {
    var seg = el("div", { class: "seg" });
    [["private", "🔒 " + t("visPrivate")], ["public", "🌐 " + t("visPublic")]].forEach(function (o) {
      var b = el("button", { text: o[1], "aria-pressed": state === o[0] ? "true" : "false" });
      b.addEventListener("click", function () {
        state = o[0]; onToggle(state);
        Array.prototype.forEach.call(seg.children, function (x) { x.setAttribute("aria-pressed", "false"); });
        b.setAttribute("aria-pressed", "true");
      });
      seg.appendChild(b);
    });
    return el("div", { class: "field" }, [
      el("span", { class: "label", text: t("visLabel") }), seg,
      el("span", { class: "sub", text: t("visNote") })
    ]);
  }

  function sheetEntry(body, s) {
    var it = byId(s.id);
    var pinned = false;
    body.appendChild(el("h2", { text: t("addEntry") + " · " + nameOf(it) }));
    var dateIn = el("input", { type: "date", value: today() });
    var textIn = el("textarea", { placeholder: t("entryPh"), maxlength: "600" });
    body.appendChild(el("div", { class: "field" }, [el("span", { class: "label", text: t("date") }), dateIn]));

    // how long you were at it — this is what fills the orb
    var minutes = 30;
    var durRow = el("div", { class: "chips" });
    [15, 30, 45, 60, 90, 120].forEach(function (m) {
      var b = el("button", { class: "chip", "aria-pressed": m === 30 ? "true" : "false",
        text: m < 60 ? m + "m" : (m / 60) + "h" });
      b.addEventListener("click", function () {
        minutes = m;
        Array.prototype.forEach.call(durRow.children, function (x) { x.setAttribute("aria-pressed", "false"); });
        b.setAttribute("aria-pressed", "true");
      });
      durRow.appendChild(b);
    });
    body.appendChild(el("div", { class: "field" }, [el("span", { class: "label", text: t("howLong") }), durRow]));

    body.appendChild(textIn);
    var visibility = "private";
    body.appendChild(visRow(visibility, function (v2) { visibility = v2; }));
    body.appendChild(pinRow(false, function (v2) { pinned = v2; }));
    body.appendChild(el("button", { class: "btn", text: t("save"), onclick: function () {
      var txt = textIn.value.trim();
      if (!txt) { textIn.focus(); return; }
      var rec = { id: uid(), interestId: it.id, date: dateIn.value || today(), text: txt,
                  minutes: minutes, visibility: visibility,
                  isPinned: pinned, createdAt: Date.now(), updatedAt: Date.now() };
      S.entries.push(rec); putAll("entries", rec);
      go("saved", { id: it.id });
    }}));
    body.appendChild(el("button", { class: "btn2", text: t("cancel"), onclick: closeSheet }));
    setTimeout(function () { textIn.focus(); }, 40);
  }

  function sheetPhoto(body, s) {
    var it = byId(s.id);
    var pinned = false, blob = null;
    body.appendChild(el("h2", { text: t("addPhoto") + " · " + nameOf(it) }));

    var file = el("input", { type: "file", accept: "image/*" });
    file.style.display = "none";
    var preview = el("img", { alt: "", style: "max-width:150px;border-radius:12px;display:none" });
    var capIn = el("input", { type: "text", placeholder: t("captionPh"), maxlength: "80" });
    var saveBtn = el("button", { class: "btn", text: t("save"), disabled: "" });

    file.addEventListener("change", function () {
      var f = file.files && file.files[0];
      if (!f) return;
      downscale(f, 1600, function (out) {
        blob = out;
        preview.src = objURL(out);
        preview.style.display = "";
        saveBtn.removeAttribute("disabled");
      });
    });

    body.appendChild(el("button", { class: "btn2", text: t("choosePhoto"), onclick: function () { file.click(); } }));
    body.appendChild(file);
    body.appendChild(preview);
    body.appendChild(el("div", { class: "field" }, [el("span", { class: "label", text: t("caption") }), capIn]));
    var visibility = "private";
    body.appendChild(visRow(visibility, function (v2) { visibility = v2; }));
    body.appendChild(pinRow(false, function (v2) { pinned = v2; }));
    saveBtn.addEventListener("click", function () {
      if (!blob) return;
      var rec = { id: uid(), interestId: it.id, blob: blob, caption: capIn.value.trim(),
                  visibility: visibility, isPinned: pinned, createdAt: Date.now() };
      S.photos.push(rec); putAll("photos", rec);
      go("saved", { id: it.id });
    });
    body.appendChild(saveBtn);
    body.appendChild(el("button", { class: "btn2", text: t("cancel"), onclick: closeSheet }));
  }

  function sheetOrb(body, s) {
    var editing = s.id ? byId(s.id) : null;
    var preset = s.preset || null;   // prefilled from an Explore idea
    var color = editing ? editing.color : (preset ? preset.color : PALETTE[S.interests.length % PALETTE.length]);

    body.appendChild(el("h2", { text: editing ? t("editOrb") : t("newInterest") }));

    var nameIn = el("input", { type: "text", maxlength: "24", placeholder: t("interestPh"),
      value: editing ? editing.name : (preset ? (LANG === "en" ? preset.name : preset.nameZh) : "") });
    var whyIn = el("input", { type: "text", maxlength: "80", placeholder: t("whyPh"), value: editing ? (editing.why || "") : "" });
    var timeIn = el("input", { type: "time", value: editing ? (editing.time || "16:00") : "16:00" });
    var friendIn = el("input", { type: "text", maxlength: "60", placeholder: t("friendsPh"),
      value: editing ? (editing.friends || []).join(", ") : "" });

    var sw = el("div", { class: "swatches" });
    PALETTE.forEach(function (c) {
      var b = el("button", { class: "swatch", "aria-pressed": c === color ? "true" : "false", "aria-label": c });
      b.style.setProperty("--c", c);
      b.style.background = "radial-gradient(circle at 34% 30%, " + c + " 40%, " + shade(c, -50) + " 100%)";
      b.addEventListener("click", function () {
        color = c;
        Array.prototype.forEach.call(sw.children, function (x) { x.setAttribute("aria-pressed", "false"); });
        b.setAttribute("aria-pressed", "true");
      });
      sw.appendChild(b);
    });

    body.appendChild(el("div", { class: "field" }, [el("span", { class: "label", text: t("name") }), nameIn]));
    body.appendChild(el("div", { class: "field" }, [el("span", { class: "label", text: t("why") }), whyIn]));
    body.appendChild(el("div", { class: "field" }, [el("span", { class: "label", text: t("colour") }), sw]));
    body.appendChild(el("div", { class: "field" }, [el("span", { class: "label", text: t("timeLabel") }), timeIn]));
    body.appendChild(el("div", { class: "field" }, [el("span", { class: "label", text: t("friendsLabel") }), friendIn]));

    body.appendChild(el("button", { class: "btn", text: t("save"), onclick: function () {
      var nm = nameIn.value.trim();
      if (!nm) { nameIn.focus(); return; }
      var friends = friendIn.value.split(/[,，]/).map(function (x) { return x.trim(); }).filter(Boolean);
      if (editing) {
        editing.name = nm; editing.why = whyIn.value.trim(); editing.color = color;
        editing.time = timeIn.value; editing.friends = friends; editing.updatedAt = Date.now();
        putAll("interests", editing);
      } else {
        var rec = { id: uid(), name: nm, why: whyIn.value.trim(), color: color, time: timeIn.value,
                    friends: friends, createdAt: Date.now(), updatedAt: Date.now() };
        S.interests.push(rec); putAll("interests", rec);
      }
      scheduleTimers();
      closeSheet();
    }}));

    if (editing) {
      body.appendChild(el("button", { class: "btn2 btn-danger", text: t("deleteOrb"), onclick: function () {
        S.photos.filter(function (p) { return p.interestId === editing.id; }).forEach(function (p) { delRec("photos", p.id); });
        S.entries.filter(function (e) { return e.interestId === editing.id; }).forEach(function (e) { delRec("entries", e.id); });
        S.photos = S.photos.filter(function (p) { return p.interestId !== editing.id; });
        S.entries = S.entries.filter(function (e) { return e.interestId !== editing.id; });
        S.interests = S.interests.filter(function (x) { return x.id !== editing.id; });
        delRec("interests", editing.id);
        go("home");
      }}));
    }
    body.appendChild(el("button", { class: "btn2", text: t("cancel"), onclick: closeSheet }));
    setTimeout(function () { nameIn.focus(); }, 40);
  }

  function renderViewer() {
    var p = S.photos.filter(function (x) { return x.id === view.viewer; })[0];
    if (!p) return;
    var box = el("div", { class: "viewer" }, [
      el("img", { src: objURL(p.blob), alt: p.caption || "" }),
      p.caption ? el("div", { class: "cap", text: p.caption }) : null,
      el("button", { class: "btn2", style: "max-width:220px", text: t("close"), onclick: closeSheet }),
      el("button", { class: "btn2 btn-danger", style: "max-width:220px", text: t("del"), onclick: function () {
        S.photos = S.photos.filter(function (x) { return x.id !== p.id; });
        delRec("photos", p.id);
        closeSheet();
      }})
    ]);
    document.querySelector(".app").appendChild(box);
  }

  function downscale(file, max, cb) {
    var url = URL.createObjectURL(file);
    var img = new Image();
    img.onload = function () {
      var scale = Math.min(1, max / Math.max(img.width, img.height));
      if (scale === 1) { URL.revokeObjectURL(url); return cb(file); }
      var c = document.createElement("canvas");
      c.width = Math.round(img.width * scale);
      c.height = Math.round(img.height * scale);
      c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
      c.toBlob(function (b) { URL.revokeObjectURL(url); cb(b || file); }, "image/jpeg", 0.82);
    };
    img.onerror = function () { URL.revokeObjectURL(url); cb(file); };
    img.src = url;
  }

  /* ================= boot ================= */
  openDB().then(function () {
    return Promise.all([getAll("meta"), getAll("interests"), getAll("photos"), getAll("entries")]);
  }).then(function (r) {
    S.profile = r[0].filter(function (m) { return m.key === "profile"; })[0] || null;
    S.interests = r[1].sort(function (a, b) { return a.createdAt - b.createdAt; });
    S.photos = r[2];
    S.entries = r[3];
    // Entries written before durations existed get a nominal half hour, once,
    // so old logs still contribute to the hours shown on an orb.
    S.entries.forEach(function (e) {
      if (typeof e.minutes !== "number") { e.minutes = 30; putAll("entries", e); }
    });
    if (S.profile && S.profile.lang) LANG = S.profile.lang;
    applyTheme(S.profile && S.profile.theme);
    scheduleTimers();
    render();
  }).catch(function (e) {
    document.getElementById("view").textContent = "Storage unavailable: " + e;
  });
})();
</script>
